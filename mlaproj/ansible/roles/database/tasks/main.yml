---
- name: Launch database
  community.docker.docker_container:
    name: database
    image: "{{ dockerhub_username }}/tp-devops-simple-database:latest"
    networks:
      - name: app-network
    env:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - db-data:/var/lib/postgresql/data
    state: started
    recreate: true
    pull: true
